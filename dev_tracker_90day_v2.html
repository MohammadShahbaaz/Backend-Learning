
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f13;--surface:#17171d;--surface2:#1e1e27;--border:#2a2a36;--border2:#363644;
  --text:#e8e8f0;--muted:#7a7a8e;--hint:#4a4a5e;
  --accent:#7c6af7;--accent-soft:#2a2545;--accent-border:#4a3f9e;
  --green:#3ecf8e;--green-soft:#0f2e20;
  --amber:#f59e0b;--amber-soft:#2a1f00;
  --red:#f87171;--red-soft:#2a0f0f;
  --mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
.app{display:flex;min-height:100vh}
.sidebar{width:260px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:24px 0;position:sticky;top:0;height:100vh;overflow-y:auto}
.main{width:680px;padding:28px 32px;flex-shrink:0;overflow-y:auto}
.spacer{flex:1}
.sidebar-header{padding:0 20px 16px;border-bottom:1px solid var(--border);margin-bottom:12px}
.sidebar-logo{font-size:13px;font-weight:600;color:var(--accent);letter-spacing:.5px;text-transform:uppercase;font-family:var(--mono)}
.sidebar-sub{font-size:11px;color:var(--muted);margin-top:2px}
.phase-label{font-size:10px;font-weight:600;color:var(--hint);text-transform:uppercase;letter-spacing:1px;padding:8px 20px 4px}
.week-btn{display:flex;align-items:center;gap:10px;width:100%;padding:8px 20px;background:none;border:none;color:var(--muted);font-family:var(--sans);font-size:13px;cursor:pointer;text-align:left;border-left:2px solid transparent;transition:all .15s}
.week-btn:hover{background:var(--surface2);color:var(--text)}
.week-btn.active{background:var(--accent-soft);color:var(--accent);border-left-color:var(--accent)}
.week-dot{width:6px;height:6px;border-radius:50%;background:var(--border2);flex-shrink:0}
.week-btn.done .week-dot{background:var(--green)}
.week-btn.active .week-dot{background:var(--accent)}
.week-progress-mini{margin-left:auto;font-size:10px;font-family:var(--mono);color:var(--hint)}
.week-btn.active .week-progress-mini{color:var(--accent)}
.week-header{margin-bottom:20px}
.week-tag{font-size:11px;font-weight:600;font-family:var(--mono);color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.week-title{font-size:20px;font-weight:600;margin-bottom:2px}
.week-desc{font-size:13px;color:var(--muted);margin-bottom:12px}
.stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.stat-num{font-size:20px;font-weight:600;font-family:var(--mono);color:var(--accent)}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px}
.schedule-banner{padding:10px 14px;border-radius:8px;font-size:12px;font-weight:500;margin-bottom:18px;display:flex;align-items:center;gap:8px;border-left:3px solid transparent}
.schedule-banner.behind{background:var(--red-soft);border:1px solid #5a1a1a;border-left-color:var(--red);color:var(--red)}
.schedule-banner.ahead{background:var(--green-soft);border:1px solid #1a4a30;border-left-color:var(--green);color:var(--green)}
.schedule-banner.ontrack{background:var(--accent-soft);border:1px solid var(--accent-border);border-left-color:var(--accent);color:var(--accent)}
.cal-section{margin-bottom:20px}
.cal-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-family:var(--mono)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day{border-radius:6px;padding:5px 3px;text-align:center;cursor:pointer;transition:all .15s;border:1px solid transparent}
.cal-day .cal-date{font-size:10px;font-family:var(--mono);color:var(--hint);margin-bottom:2px}
.cal-day .cal-dnum{font-size:12px;font-weight:500;color:var(--muted)}
.cal-day.cal-past{background:var(--surface)}
.cal-day.cal-past .cal-dnum{color:var(--text)}
.cal-day.cal-today{background:var(--accent-soft);border-color:var(--accent-border)}
.cal-day.cal-today .cal-dnum{color:var(--accent)}
.cal-day.cal-today .cal-date{color:var(--accent)}
.cal-day.cal-future{background:var(--surface2);opacity:.6}
.cal-day.cal-done{background:var(--green-soft);border-color:#1a4a30}
.cal-day.cal-done .cal-dnum{color:var(--green)}
.cal-day.cal-done .cal-date{color:#3ecf8e99}
.cal-day.cal-behind{background:var(--red-soft);border-color:#5a1a1a}
.cal-day.cal-behind .cal-dnum{color:var(--red)}
.cal-day.cal-behind .cal-date{color:#f8717199}
.cal-day.cal-active-sel{box-shadow:0 0 0 2px var(--accent)}
.cal-day.cal-done.cal-active-sel{box-shadow:0 0 0 2px var(--green)}
.cal-day:hover{border-color:var(--border2);opacity:1}
.cal-dot{width:4px;height:4px;border-radius:50%;margin:2px auto 0;background:var(--hint)}
.cal-day.cal-done .cal-dot{background:var(--green)}
.cal-day.cal-behind .cal-dot{background:var(--red)}
.cal-day.cal-today .cal-dot{background:var(--accent)}
.progress-wrap{margin-bottom:20px}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:5px}
.progress-label span:last-child{font-family:var(--mono);color:var(--accent)}
.progress-bar{height:5px;background:var(--surface2);border-radius:99px;overflow:hidden;border:1px solid var(--border)}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),#a78bfa);border-radius:99px;transition:width .4s}
.progress-fill.complete{background:linear-gradient(90deg,var(--green),#34d399)}
.day-tabs{display:flex;gap:5px;margin-bottom:18px;flex-wrap:wrap}
.day-tab{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:12px;font-family:var(--mono);cursor:pointer;transition:all .15s}
.day-tab:hover{border-color:var(--border2);color:var(--text)}
.day-tab.active{border-color:var(--accent-border);background:var(--accent-soft);color:var(--accent)}
.day-tab.day-done{border-color:#1a3d2e;background:var(--green-soft);color:var(--green)}
.day-tab.day-behind{border-color:#5a1a1a;background:var(--red-soft);color:var(--red)}
.day-tab.day-today{border-color:var(--accent-border)}
.day-num-h{font-size:11px;font-family:var(--mono);color:var(--muted);margin-bottom:3px}
.day-title-main{font-size:17px;font-weight:600;margin-bottom:6px}
.day-focus-tag{display:inline-block;font-size:11px;padding:3px 10px;border-radius:4px;background:var(--amber-soft);color:var(--amber);border:1px solid #3a2800;font-family:var(--mono)}
.day-date-badge{display:inline-block;font-size:11px;padding:3px 10px;border-radius:4px;background:var(--surface2);color:var(--muted);border:1px solid var(--border);font-family:var(--mono);margin-left:8px}
.block-section{margin-bottom:10px}
.block-time{font-size:11px;font-family:var(--mono);color:var(--hint);margin-bottom:5px;padding-left:2px}
.task-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;border-left:3px solid var(--border)}
.task-card.blue-l{border-left-color:#3b6fcf}
.task-card.teal-l{border-left-color:#1a9e70}
.task-card.purple-l{border-left-color:#7c6af7}
.task-card.amber-l{border-left-color:#d97706}
.task-card.gray-l{border-left-color:var(--border2);background:var(--surface2)}
.task-card.red-l{border-left-color:#dc2626}
.task-card.done-card{background:#0d1a0d;border-color:#1a3d2e;border-left-color:var(--green)!important}
.task-top{display:flex;align-items:flex-start;gap:10px}
.task-checkbox{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--border2);background:var(--surface2);cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;transition:all .15s}
.task-checkbox:hover{border-color:var(--accent)}
.task-checkbox.checked{background:var(--green);border-color:var(--green);color:#0a1a0a}
.task-body{flex:1}
.task-name{font-size:13px;font-weight:500;margin-bottom:3px}
.task-card.done-card .task-name{color:var(--muted);text-decoration:line-through}
.task-desc{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:6px}
.task-card.done-card .task-desc{color:var(--hint)}
.tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:4px;background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.checkpoint-box{margin-top:16px;padding:12px 14px;background:var(--green-soft);border:1px solid #1a3d2e;border-radius:10px}
.cp-label{font-size:10px;font-weight:600;color:var(--green);text-transform:uppercase;letter-spacing:1px;font-family:var(--mono);margin-bottom:3px}
.cp-text{font-size:12px;color:#86efac}
.day-complete-banner{display:none;margin-top:14px;padding:12px 14px;background:var(--accent-soft);border:1px solid var(--accent-border);border-radius:10px;font-size:13px;color:var(--accent);text-align:center;font-weight:500}
.day-complete-banner.show{display:block}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>

<div class="app">

<script>
const START_DATE=new Date('2026-06-12');
START_DATE.setHours(0,0,0,0);

function getToday(){
  const d=new Date();
  d.setHours(0,0,0,0);
  return d;
}

function dateForGlobalDay(n){
  const d=new Date(START_DATE);
  d.setDate(d.getDate()+n);
  return d;
}

function fmtDate(d){
  return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short'});
}

const STORAGE_KEY='devtracker_v3';
let state=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
let currentWeekId='w1';
let currentDayIdx=0;

function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}

function getGlobalDayIndex(weekId,dayIdx){
  let g=0;
  for(const phase of PLAN){
    for(const week of phase.weeks){
      if(week.id===weekId) return g+dayIdx;
      g+=week.days.length;
    }
  }
  return 0;
}

function getDayStatus(week,dayIdx){
  const TODAY=getToday();
  const day=week.days[dayIdx];
  const allDone=day.tasks.every(t=>state[t.id]);
  const g=getGlobalDayIndex(week.id,dayIdx);
  const scheduledDate=dateForGlobalDay(g);
  const isPast=scheduledDate<TODAY;
  const isToday=scheduledDate.getTime()===TODAY.getTime();
  const isFuture=scheduledDate>TODAY;
  return{allDone,isPast,isToday,isFuture,scheduledDate,g};
}

function getWeekProgress(week){
  let done=0;
  for(let d=0;d<week.days.length;d++){
    if(week.days[d].tasks.every(t=>state[t.id])) done++;
  }
  return{done,total:week.days.length};
}

function getScheduleStatus(){
  let behindDays=0,aheadDays=0;
  for(const phase of PLAN){
    for(const week of phase.weeks){
      for(let d=0;d<week.days.length;d++){
        const{allDone,isPast,isFuture}=getDayStatus(week,d);
        if(isPast&&!allDone) behindDays++;
        if(isFuture&&allDone) aheadDays++;
      }
    }
  }
  return{behindDays,aheadDays};
}

function getTotalStats(){
  let total=0,done=0,days=0;
  for(const phase of PLAN){
    for(const week of phase.weeks){
      for(const day of week.days){
        for(const t of day.tasks){total++;if(state[t.id])done++;}
        if(day.tasks.every(t=>state[t.id]))days++;
      }
    }
  }
  return{total,done,days};
}

function getCurrentWeek(){
  for(const phase of PLAN){
    for(const week of phase.weeks){
      if(week.id===currentWeekId) return{week,phase};
    }
  }
}

function renderSidebar(){
  const sb=document.getElementById('sidebar');
  sb.innerHTML=`<div class="sidebar-header"><div class="sidebar-logo">Dev Tracker</div><div class="sidebar-sub">90-day backend roadmap</div></div>`;
  for(const phase of PLAN){
    const pg=document.createElement('div');
    pg.innerHTML=`<div class="phase-label">${phase.phase}</div>`;
    for(const week of phase.weeks){
      const p=getWeekProgress(week);
      const isDone=p.done===p.total;
      const isActive=week.id===currentWeekId;
      const btn=document.createElement('button');
      btn.className=`week-btn${isActive?' active':''}${isDone?' done':''}`;
      btn.innerHTML=`<span class="week-dot"></span>${week.title}<span class="week-progress-mini">${p.done}/${p.total}</span>`;
      btn.onclick=()=>{currentWeekId=week.id;currentDayIdx=0;renderAll()};
      pg.appendChild(btn);
    }
    sb.appendChild(pg);
  }
}

function renderCalendar(week){
  const TODAY=getToday();
  const{behindDays,aheadDays}=getScheduleStatus();
  const todayStr=TODAY.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
  let bannerHtml='';
  if(behindDays>0){
    bannerHtml=`<div class="schedule-banner behind">⚠ ${behindDays} day${behindDays>1?'s':''} behind schedule — catch up today.</div>`;
  } else if(aheadDays>0){
    bannerHtml=`<div class="schedule-banner ahead">🎯 ${aheadDays} day${aheadDays>1?'s':''} ahead of schedule — great momentum.</div>`;
  } else {
    bannerHtml=`<div class="schedule-banner ontrack">✓ On track — right where you should be.</div>`;
  }

  let calHtml=`<div class="cal-section"><div class="cal-label">Week schedule · Today: ${todayStr}</div><div class="cal-grid">`;
  for(let d=0;d<week.days.length;d++){
    const{allDone,isPast,isToday,isFuture,scheduledDate}=getDayStatus(week,d);
    let cls='cal-day';
    if(allDone) cls+=' cal-done';
    else if(isToday) cls+=' cal-today';
    else if(isPast) cls+=' cal-behind';
    else cls+=' cal-future';
    if(d===currentDayIdx) cls+=' cal-active-sel';
    calHtml+=`<div class="${cls}" onclick="selectDay(${d})">
      <div class="cal-date">${fmtDate(scheduledDate)}</div>
      <div class="cal-dnum">D${d+1}</div>
      <div class="cal-dot"></div>
    </div>`;
  }
  calHtml+=`</div></div>`;
  return bannerHtml+calHtml;
}

function renderMain(){
  const{week,phase}=getCurrentWeek();
  const main=document.getElementById('main');
  const stats=getTotalStats();
  const prog=getWeekProgress(week);
  const pct=prog.total>0?Math.round((prog.done/prog.total)*100):0;

  main.innerHTML=`
    <div style="font-size:11px;color:var(--muted);font-family:var(--mono);margin-bottom:6px">${phase.phase}</div>
    <div class="week-header">
      <div class="week-tag">${week.id.toUpperCase()}</div>
      <div class="week-title">${week.title}</div>
      <div class="week-desc">${week.desc}</div>
    </div>
    <div class="stats-bar">
      <div class="stat-card"><div class="stat-num">${stats.done}</div><div class="stat-label">tasks done</div></div>
      <div class="stat-card"><div class="stat-num">${stats.days}</div><div class="stat-label">days complete</div></div>
      <div class="stat-card"><div class="stat-num">${Math.round((stats.done/Math.max(stats.total,1))*100)}%</div><div class="stat-label">overall</div></div>
    </div>
    ${renderCalendar(week)}
    <div class="progress-wrap">
      <div class="progress-label"><span>Week — ${prog.done}/${prog.total} days</span><span>${pct}%</span></div>
      <div class="progress-bar"><div class="progress-fill${pct===100?' complete':''}" style="width:${pct}%"></div></div>
    </div>
    <div class="day-tabs">${week.days.map((day,i)=>{
      const{allDone,isPast,isToday}=getDayStatus(week,i);
      let cls='day-tab';
      if(i===currentDayIdx) cls+=' active';
      if(allDone) cls+=' day-done';
      else if(isToday) cls+=' day-today';
      else if(isPast) cls+=' day-behind';
      return `<div class="${cls}" onclick="selectDay(${i})">D${i+1}${allDone?'<span style="font-size:10px;margin-left:3px">✓</span>':''}</div>`;
    }).join('')}</div>
    <div id="day-content"></div>`;
  renderDay();
}

function renderDay(){
  const TODAY=getToday();
  const{week}=getCurrentWeek();
  const day=week.days[currentDayIdx];
  const{allDone,scheduledDate,isPast,isToday,isFuture}=getDayStatus(week,currentDayIdx);
  const doneTasks=day.tasks.filter(t=>state[t.id]).length;
  const pct=Math.round((doneTasks/day.tasks.length)*100);
  let dateLabel=fmtDate(scheduledDate)+(isToday?' — today':isPast&&!allDone?' — overdue':allDone?' — done':isFuture?' — upcoming':'');
  let badgeStyle=isPast&&!allDone?'background:var(--red-soft);color:var(--red);border-color:#5a1a1a':isToday?'background:var(--accent-soft);color:var(--accent);border-color:var(--accent-border)':allDone?'background:var(--green-soft);color:var(--green);border-color:#1a4a30':'';

  let html=`
    <div class="day-header" style="margin-bottom:16px">
      <div class="day-num-h">Day ${currentDayIdx+1} of ${week.days.length}</div>
      <div class="day-title-main">${day.title}</div>
      <div style="margin-top:6px;display:flex;align-items:center;flex-wrap:wrap;gap:6px">
        <span class="day-focus-tag">${day.focus}</span>
        <span class="day-date-badge" style="${badgeStyle}">${dateLabel}</span>
      </div>
    </div>
    <div class="progress-wrap" style="margin-bottom:16px">
      <div class="progress-label"><span>Day — ${doneTasks}/${day.tasks.length} tasks</span><span>${pct}%</span></div>
      <div class="progress-bar"><div class="progress-fill${pct===100?' complete':''}" style="width:${pct}%"></div></div>
    </div>`;

  for(const task of day.tasks){
    const done=!!state[task.id];
    html+=`<div class="block-section">
      <div class="block-time">${task.time}</div>
      <div class="task-card ${task.color}${done?' done-card':''}" id="card-${task.id}">
        <div class="task-top">
          <div class="task-checkbox${done?' checked':''}" onclick="toggleTask('${task.id}')">${done?'✓':''}</div>
          <div class="task-body">
            <div class="task-name">${task.name}</div>
            <div class="task-desc">${task.desc}</div>
            <div class="tags">${task.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
          </div>
        </div>
      </div>
    </div>`;
  }

  html+=`<div class="checkpoint-box"><div class="cp-label">day checkpoint</div><div class="cp-text">${day.checkpoint}</div></div>
    <div class="day-complete-banner${allDone?' show':''}" id="complete-banner">All tasks done — Day ${currentDayIdx+1} complete. Move to the next day.</div>`;

  document.getElementById('day-content').innerHTML=html;
}

function toggleTask(id){state[id]=!state[id];save();renderAll()}
function selectDay(idx){currentDayIdx=idx;renderMain()}
function renderAll(){renderSidebar();renderMain()}
renderAll();
</script>
